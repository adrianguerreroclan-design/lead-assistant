<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comfort Pro — Schedule Service</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .widget { width: 420px; max-width: 100vw; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); display: flex; flex-direction: column; height: 640px; overflow: hidden; }

    .header { background: #1a56db; color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #3f83f8; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-text h2 { font-size: 15px; font-weight: 600; }
    .header-text p { font-size: 12px; opacity: .8; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #84e1bc; margin-left: auto; }

    /* Qualification rail */
    .qual-rail { display: flex; gap: 8px; padding: 10px 16px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }
    .chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; background: #e5e7eb; color: #6b7280; transition: background .2s, color .2s; }
    .chip.done { background: #d1fae5; color: #065f46; }
    .chip svg { width: 12px; height: 12px; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.assistant { background: #f3f4f6; color: #111827; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: #1a56db; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.typing { opacity: .6; }
    .dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #9ca3af; margin: 0 2px; animation: bounce .8s infinite; }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    /* Slot cards */
    .slots { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
    .slot-btn { background: #fff; border: 1.5px solid #1a56db; color: #1a56db; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; text-align: left; transition: background .15s; }
    .slot-btn:hover { background: #eff6ff; }

    /* Input */
    .input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #e5e7eb; }
    #msgInput { flex: 1; border: 1.5px solid #d1d5db; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; resize: none; height: 40px; line-height: 22px; }
    #msgInput:focus { border-color: #1a56db; }
    #sendBtn { background: #1a56db; color: #fff; border: none; border-radius: 8px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    #sendBtn:hover { background: #1e429f; }
    #sendBtn:disabled { background: #93c5fd; cursor: not-allowed; }
    #sendBtn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="avatar">🔧</div>
    <div class="header-text">
      <h2>Comfort Pro Assistant</h2>
      <p>Schedule HVAC &amp; Plumbing service</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="qual-rail" id="qualRail">
    <div class="chip" id="chip-name">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm-5 6s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3z"/></svg>
      Name
    </div>
    <div class="chip" id="chip-service">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M10.5 1.5a.5.5 0 00-.5.5v1H6V2a.5.5 0 00-1 0v1H3.5A1.5 1.5 0 002 4.5v8A1.5 1.5 0 003.5 14h9a1.5 1.5 0 001.5-1.5v-8A1.5 1.5 0 0012.5 3H11V2a.5.5 0 00-.5-.5z"/></svg>
      Service
    </div>
    <div class="chip" id="chip-address">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a5 5 0 100 10A5 5 0 008 1zm0 1.5a3.5 3.5 0 110 7 3.5 3.5 0 010-7zM8 5a1 1 0 100 2 1 1 0 000-2z"/></svg>
      Address
    </div>
    <div class="chip" id="chip-urgency">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.5 4v4.25l3 1.75-.5.87L7.5 10V5h1z"/></svg>
      Urgency
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea id="msgInput" placeholder="Type a message…" rows="1"></textarea>
    <button id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let sessionId = null;
  let polling = null;
  const CHIP_KEYS = ['name','service','address','urgency'];

  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  function addMessage(role, content, extra) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (extra === 'typing') {
      div.classList.add('typing');
      div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
      div.id = 'typing-indicator';
    } else {
      div.textContent = content;
      if (extra && extra.slots) {
        const slotsDiv = document.createElement('div');
        slotsDiv.className = 'slots';
        extra.slots.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'slot-btn';
          btn.textContent = s.label;
          btn.onclick = () => confirmSlot(s.iso, s.label);
          slotsDiv.appendChild(btn);
        });
        div.appendChild(slotsDiv);
      }
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function updateRail(lead) {
    if (!lead) return;
    CHIP_KEYS.forEach(k => {
      const chip = document.getElementById(`chip-${k}`);
      if (chip) chip.classList.toggle('done', !!lead[k]);
    });
  }

  function extractSlots(text) {
    // If reply contains slot JSON embedded by agent, parse it
    // Otherwise return null
    try {
      const match = text.match(/\[\s*\{.*?"iso".*?\}\s*\]/s);
      if (match) return JSON.parse(match[0]);
    } catch {}
    return null;
  }

  async function send(msg) {
    if (!msg.trim()) return;
    addMessage('user', msg);
    input.value = '';
    sendBtn.disabled = true;
    addMessage('assistant', '', 'typing');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: msg }),
      });
      const data = await res.json();
      removeTyping();
      if (data.error) { addMessage('assistant', 'Sorry, something went wrong. Please try again.'); return; }
      sessionId = data.sessionId;
      updateRail(data.lead);
      const slots = extractSlots(data.reply);
      // Remove JSON blob from visible text if present
      const cleanText = data.reply.replace(/\[\s*\{.*?"iso".*?\}\s*\]/s, '').trim();
      addMessage('assistant', cleanText || data.reply, slots ? { slots } : null);
      startPolling();
    } catch {
      removeTyping();
      addMessage('assistant', 'Connection error. Please try again.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  async function confirmSlot(iso, label) {
    if (!sessionId) return;
    addMessage('user', `Book the ${label} slot`);
    addMessage('assistant', '', 'typing');
    try {
      const res = await fetch('/api/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, slotIso: iso, slotLabel: label }),
      });
      const data = await res.json();
      removeTyping();
      updateRail(data.lead);
      addMessage('assistant', data.message || 'Booking confirmed!');
    } catch {
      removeTyping();
      addMessage('assistant', 'Could not confirm the booking. Please try again.');
    }
  }

  function startPolling() {
    if (polling || !sessionId) return;
    polling = setInterval(async () => {
      if (!sessionId) return;
      try {
        const res = await fetch(`/api/session/${sessionId}`);
        const data = await res.json();
        updateRail(data.lead);
        (data.pending || []).forEach(m => addMessage('assistant', m.content));
      } catch {}
    }, 3000);
  }

  sendBtn.onclick = () => send(input.value);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
  });

  // Greeting on load
  window.addEventListener('load', () => {
    addMessage('assistant', 'Hi! I\'m the Comfort Pro scheduling assistant. I can help you book HVAC or plumbing service. To get started — what\'s your name?');
  });
</script>
</body>
</html>
