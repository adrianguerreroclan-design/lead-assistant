<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comfort Pro — Schedule Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(6,182,212,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(16,185,129,0.05) 0%, transparent 50%),
        linear-gradient(160deg, #060d1a 0%, #080e1c 50%, #050b16 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Outer glow ring ── */
    .widget-glow {
      position: relative;
      border-radius: 26px;
      filter: drop-shadow(0 0 40px rgba(6,182,212,0.12));
    }
    .widget-glow::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 27px;
      background: linear-gradient(135deg,
        rgba(6,182,212,0.25) 0%,
        rgba(16,185,129,0.1) 50%,
        rgba(59,130,246,0.15) 100%);
      z-index: 0;
    }

    /* ── Widget shell ── */
    .widget {
      position: relative;
      z-index: 1;
      width: 460px;
      max-width: calc(100vw - 32px);
      height: 700px;
      background: #0c1526;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.055);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 40px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.055);
    }

    /* ── Header ── */
    .header {
      padding: 22px 24px 18px;
      background: linear-gradient(160deg, #0f2035 0%, #0d1b30 100%);
      border-bottom: 1px solid rgba(255,255,255,0.055);
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 55%, #06d6a0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(6,182,212,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .header-content { flex: 1; min-width: 0; }
    .header-content h1 {
      font-size: 16.5px;
      font-weight: 800;
      color: #f0f6ff;
      letter-spacing: -0.4px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-content p {
      font-size: 11.5px;
      color: #4a6080;
      margin-top: 3px;
      font-weight: 500;
      letter-spacing: 0.1px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 999px;
      padding: 4px 10px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px rgba(16,185,129,0.9);
      animation: pulse-dot 2.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 6px rgba(16,185,129,0.9); }
      50%       { box-shadow: 0 0 14px rgba(16,185,129,0.4); }
    }
    .status-text {
      font-size: 10.5px;
      font-weight: 700;
      color: #10b981;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    /* ── Qualification rail ── */
    .qual-rail {
      display: flex;
      gap: 7px;
      padding: 11px 20px 12px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      color: #3a4d62;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
      user-select: none;
    }
    .chip svg { width: 10px; height: 10px; flex-shrink: 0; }

    .chip.done {
      background: rgba(16,185,129,0.1);
      border-color: rgba(16,185,129,0.45);
      color: #34d399;
      box-shadow:
        0 0 14px rgba(16,185,129,0.2),
        inset 0 0 10px rgba(16,185,129,0.06);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.07) transparent;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
    }

    .msg {
      max-width: 85%;
      padding: 13px 17px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.65;
      animation: msgIn 0.28s cubic-bezier(0.34, 1.46, 0.64, 1) both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.assistant {
      background: #152030;
      border: 1px solid rgba(255,255,255,0.06);
      color: #b8cce0;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .msg.user {
      background: linear-gradient(135deg, #0369a1 0%, #0891b2 45%, #06b6d4 100%);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(6,182,212,0.28);
    }

    .msg.typing { padding: 16px 18px; }
    .dots { display: flex; align-items: center; gap: 5px; }
    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2d4a62;
      animation: dot-bounce 1.1s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.16s; }
    .dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); background: #2d4a62; }
      30%            { transform: translateY(-7px); background: #06b6d4; }
    }

    /* ── Slot picker ── */
    .slots {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 11px;
    }
    .slot-btn {
      background: rgba(6,182,212,0.07);
      border: 1px solid rgba(6,182,212,0.22);
      color: #67e8f9;
      border-radius: 12px;
      padding: 9px 15px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      letter-spacing: 0.1px;
      transition: all 0.2s ease;
    }
    .slot-btn:hover {
      background: rgba(6,182,212,0.16);
      border-color: rgba(6,182,212,0.5);
      box-shadow: 0 0 16px rgba(6,182,212,0.18);
      transform: translateX(3px);
    }

    /* ── Input bar ── */
    .input-area {
      padding: 14px 18px 18px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #142030;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 11px 11px 11px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(6,182,212,0.35);
      box-shadow: 0 0 0 3px rgba(6,182,212,0.07);
    }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #d4e4f0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      resize: none;
      height: 22px;
      padding: 0;
      overflow-y: hidden;
    }
    #msgInput::placeholder { color: #283d52; }

    #sendBtn {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(6,182,212,0.35);
    }
    #sendBtn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(6,182,212,0.55);
    }
    #sendBtn:active:not(:disabled) { transform: scale(0.95); }
    #sendBtn:disabled {
      background: #1a2d3e;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.45;
    }
    #sendBtn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

<div class="widget-glow">
  <div class="widget">

    <!-- Header -->
    <div class="header">
      <div class="logo-icon">🔧</div>
      <div class="header-content">
        <h1>Comfort Pro</h1>
        <p>Greater Phoenix metro · (602) 555-0142</p>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
      </div>
    </div>

    <!-- Qualification rail -->
    <div class="qual-rail" id="qualRail">
      <div class="chip" id="chip-name">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 8a3 3 0 100-6 3 3 0 000 6zm-5 6s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3z"/>
        </svg>
        Name
      </div>
      <div class="chip" id="chip-service">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M10.5 1.5a.5.5 0 00-.5.5v1H6V2a.5.5 0 00-1 0v1H3.5A1.5 1.5 0 002 4.5v8A1.5 1.5 0 003.5 14h9a1.5 1.5 0 001.5-1.5v-8A1.5 1.5 0 0012.5 3H11V2a.5.5 0 00-.5-.5z"/>
        </svg>
        Service
      </div>
      <div class="chip" id="chip-address">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a5 5 0 100 10A5 5 0 008 1zm0 1.5a3.5 3.5 0 110 7 3.5 3.5 0 010-7zM8 5a1 1 0 100 2 1 1 0 000-2z"/>
        </svg>
        Address
      </div>
      <div class="chip" id="chip-urgency">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.5 4v4.25l3 1.75-.5.87L7.5 10V5h1z"/>
        </svg>
        Urgency
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="msgInput" placeholder="Message Comfort Pro…" rows="1"></textarea>
        <button id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  let sessionId = null;
  let polling = null;
  const CHIP_KEYS = ['name', 'service', 'address', 'urgency'];

  const messagesEl = document.getElementById('messages');
  const input      = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');

  function addMessage(role, content, extra) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (extra === 'typing') {
      div.classList.add('typing');
      div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
      div.id = 'typing-indicator';
    } else {
      div.textContent = content;
      if (extra && extra.slots) {
        const slotsDiv = document.createElement('div');
        slotsDiv.className = 'slots';
        extra.slots.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'slot-btn';
          btn.textContent = '📅 ' + s.label;
          btn.onclick = () => confirmSlot(s.iso, s.label);
          slotsDiv.appendChild(btn);
        });
        div.appendChild(slotsDiv);
      }
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function updateRail(lead) {
    if (!lead) return;
    CHIP_KEYS.forEach(k => {
      const chip = document.getElementById(`chip-${k}`);
      if (chip) chip.classList.toggle('done', !!lead[k]);
    });
  }

  function extractSlots(text) {
    try {
      const match = text.match(/\[\s*\{.*?"iso".*?\}\s*\]/s);
      if (match) return JSON.parse(match[0]);
    } catch {}
    return null;
  }

  async function send(msg) {
    if (!msg.trim()) return;
    addMessage('user', msg);
    input.value = '';
    input.style.height = '22px';
    sendBtn.disabled = true;
    addMessage('assistant', '', 'typing');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: msg }),
      });
      const data = await res.json();
      removeTyping();
      if (data.error) { addMessage('assistant', 'Sorry, something went wrong. Please try again.'); return; }
      sessionId = data.sessionId;
      updateRail(data.lead);
      const slots    = extractSlots(data.reply);
      const cleanText = data.reply.replace(/\[\s*\{.*?"iso".*?\}\s*\]/s, '').trim();
      addMessage('assistant', cleanText || data.reply, slots ? { slots } : null);
      startPolling();
    } catch {
      removeTyping();
      addMessage('assistant', 'Connection error. Please try again.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  async function confirmSlot(iso, label) {
    if (!sessionId) return;
    addMessage('user', `Book the ${label} slot`);
    addMessage('assistant', '', 'typing');
    try {
      const res = await fetch('/api/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, slotIso: iso, slotLabel: label }),
      });
      const data = await res.json();
      removeTyping();
      updateRail(data.lead);
      addMessage('assistant', data.message || 'Booking confirmed!');
    } catch {
      removeTyping();
      addMessage('assistant', 'Could not confirm the booking. Please try again.');
    }
  }

  function startPolling() {
    if (polling || !sessionId) return;
    polling = setInterval(async () => {
      if (!sessionId) return;
      try {
        const res = await fetch(`/api/session/${sessionId}`);
        const data = await res.json();
        updateRail(data.lead);
        (data.pending || []).forEach(m => addMessage('assistant', m.content));
      } catch {}
    }, 3000);
  }

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = '22px';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });

  sendBtn.onclick = () => send(input.value);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
  });

  window.addEventListener('load', () => {
    addMessage('assistant', "Hi! I'm your Comfort Pro scheduling assistant. I'll help you get service booked fast — what's your name?");
  });
</script>
</body>
</html>
